<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Calendar App</title><link rel='stylesheet' href='style.css'></head><body><div class='calendar-container'><div class='calendar-header'><button id='prev'>&#10094;</button><h2 id='monthYear'></h2><button id='next'>&#10095;</button></div><div class='weekdays'><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div><div id='calendar' class='days'></div></div><div id='popup' class='popup'><div class='popup-content'><h3 id='selectedDate'></h3><input id='eventInput' placeholder='Event title'><textarea id='eventDescription' placeholder='Description'></textarea><div><button id='saveEvent'>Save</button><button id='deleteEvent'>Delete</button><button id='closePopup'>Close</button></div></div></div><script src='script.js'></script></body></html>
